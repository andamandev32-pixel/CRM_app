<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Meditech</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/sts-main.css">
    <link rel="stylesheet" href="css/help.css">
</head>

<body>
    <!-- Development PIN Overlay -->
    <div id="pinOverlay"
        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0f172a; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: system-ui, -apple-system, sans-serif;">
        <div
            style="background: #1e293b; padding: 3rem; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; border: 1px solid #334155; width: 90%; max-width: 400px;">
            <div style="font-size: 3.5rem; margin-bottom: 1rem; line-height: 1;">🔒</div>
            <h3 class="mb-2" style="font-weight: 600; color: #f8fafc;">ระบบจำกัดการเข้าถึง</h3>
            <p class="mb-4" style="color: #94a3b8; font-size: 0.95rem;">กรุณาใส่รหัส PIN เพื่อเข้าสู่ระบบทดสอบ</p>

            <div class="d-flex flex-column align-items-center gap-3">
                <input type="password" id="devPinInput" class="form-control text-center" placeholder="•••••"
                    style="font-size: 2rem; width: 100%; letter-spacing: 12px; border-radius: 10px; border: 2px solid #cbd5e1; background: #f8fafc; color: #0f172a; font-weight: bold; padding: 10px;"
                    maxlength="5">
                <button id="devPinBtn" class="btn btn-primary w-100 mt-2"
                    style="border-radius: 10px; font-weight: 600; font-size: 1.1rem; padding: 12px; background-color: #3b82f6; border: none;">เข้าสู่ระบบ
                    / Enter</button>
                <div id="devPinError" class="text-danger mt-2 fw-bold"
                    style="display: none; font-size: 0.95rem; background: rgba(239, 68, 68, 0.1); padding: 8px 12px; border-radius: 6px; width: 100%;">
                    รหัส PIN ไม่ถูกต้อง!</div>
            </div>
        </div>
    </div>

    <script>
        // Check PIN early blocking render
        (function () {
            const hasPin = sessionStorage.getItem('dev_access_pin') === '10210';
            if (hasPin) {
                // hide overlay early
                const overlay = document.getElementById('pinOverlay');
                if (overlay) overlay.style.display = 'none';
            }
        })();

        // Handle PIN form
        document.addEventListener('DOMContentLoaded', () => {
            const hasPin = sessionStorage.getItem('dev_access_pin') === '10210';
            const overlay = document.getElementById('pinOverlay');
            const app = document.getElementById('app');

            if (hasPin) {
                overlay.style.display = 'none';
            } else {
                if (app) app.style.display = 'none'; // Ensure underlying app is hidden

                const btn = document.getElementById('devPinBtn');
                const input = document.getElementById('devPinInput');
                const error = document.getElementById('devPinError');

                const checkPin = () => {
                    if (input.value === '10210') {
                        sessionStorage.setItem('dev_access_pin', '10210');
                        overlay.style.opacity = '0';
                        overlay.style.transition = 'opacity 0.3s ease';
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            if (app) app.style.display = 'block';
                        }, 300);
                    } else {
                        error.style.display = 'block';
                        input.value = '';
                        input.focus();

                        // shake effect
                        overlay.children[0].animate([
                            { transform: 'translateX(0px)' },
                            { transform: 'translateX(-10px)' },
                            { transform: 'translateX(10px)' },
                            { transform: 'translateX(-10px)' },
                            { transform: 'translateX(10px)' },
                            { transform: 'translateX(0px)' }
                        ], { duration: 400, easing: 'ease-in-out' });
                    }
                };

                btn.addEventListener('click', checkPin);
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkPin();
                });

                input.focus();
            }
        });
    </script>

    <!-- Main Container -->
    <div id="app">
        <!-- Loading Screen -->
        <div id="loadingScreen" class="loading-screen">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">กำลังโหลด...</span>
            </div>
            <p class="mt-3">กำลังโหลดระบบ...</p>
        </div>

        <!-- Main Content (will be populated by router) -->
        <div id="mainContent"></div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Core JS Files -->
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>

    <!-- Data Files -->
    <script src="js/data/pipeline_templates.js"></script>
    <script src="js/data/tier_config.js"></script>

    <script src="js/mock-data.js"></script>
    <script src="js/router.js?v=3"></script>

    <!-- Module JS Files -->
    <script src="js/modules/customers.js"></script>
    <script src="js/modules/visits.js?v=4"></script>
    <script src="js/modules/demos.js"></script>
    <script src="js/modules/pipeline.js"></script>
    <script src="js/modules/products.js"></script>
    <script src="js/modules/budget-dashboard.js"></script>
    <script src="js/modules/insights.js"></script>
    <script src="js/modules/dashboards.js"></script>
    <script src="js/modules/notifications.js"></script>
    <script src="js/modules/calendar.js"></script>
    <script src="js/modules/dev-requests.js"></script>
    <script src="js/modules/meetings.js"></script>
    <script src="js/modules/projects.js"></script>
    <script src="js/modules/po-workspace.js"></script>
    <script src="js/modules/global-search.js"></script>
    <script src="js/modules/export.js"></script>
    <script src="js/modules/help.js"></script>
    <script src="js/modules/settings.js"></script>

    <!-- App JS -->
    <script src="js/sts-app.js?v=2"></script>
</body>

</html>
